<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Submit Lost Ticket</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Submit Lost Item Ticket</h1>

    <p>Use this form if you lost something on campus.</p>

    <form action="SubmitLostTicketServlet" method="post" enctype="multipart/form-data">

        <label>Full Name</label>
        <input type="text" name="studentName" required>

        <label>Student ID / EMPLID</label>
        <input type="text"
               name="studentId"
               id="studentId"
               inputmode="numeric"
               pattern="[0-9]+"
               title="Student ID must contain numbers only"
               required>

        <label>QC Email</label>
        <input type="email" name="studentEmail" required>

        <label>Phone Number</label>
        <input type="text"
               name="phone"
               id="phone"
               inputmode="numeric"
               pattern="[0-9]+"
               title="Phone number must contain numbers only">

        <label>Item Type / Category</label>
        <select name="itemType" required>
            <option value="">-- Select Category --</option>
            <option value="Electronics">Electronics</option>
            <option value="Clothing">Clothing</option>
            <option value="Bag">Bag</option>
            <option value="Wallet">Wallet</option>
            <option value="Keys">Keys</option>
            <option value="ID Card">ID Card</option>
            <option value="Books / Notes">Books / Notes</option>
            <option value="Jewelry">Jewelry</option>
            <option value="Water Bottle">Water Bottle</option>
            <option value="Other">Other</option>
        </select>

        <label>Detailed Item Description</label>
        <textarea name="description"
                  placeholder="Describe color, brand, size, unique marks, stickers, etc."
                  required></textarea>

        <label>Where Did You Lose It?</label>
        <select name="lostLocation" required>
            <option value="">-- Select Location --</option>
            <option value="Alumni Hall">Alumni Hall</option>
            <option value="Campbell Dome">Campbell Dome</option>
            <option value="Colden Auditorium">Colden Auditorium</option>
            <option value="Colwin Hall">Colwin Hall</option>
            <option value="Delany Hall">Delany Hall</option>
            <option value="Dining Hall">Dining Hall</option>
            <option value="FitzGerald Gymnasium">FitzGerald Gymnasium</option>
            <option value="Frese Hall">Frese Hall</option>
            <option value="G Building">G Building</option>
            <option value="Gertz Center">Gertz Center</option>
            <option value="Goldstein Theatre">Goldstein Theatre</option>
            <option value="Honors Hall">Honors Hall</option>
            <option value="I Building">I Building</option>
            <option value="Jefferson Hall">Jefferson Hall</option>
            <option value="Kiely Hall">Kiely Hall</option>
            <option value="King Hall">King Hall</option>
            <option value="Kissena Hall">Kissena Hall</option>
            <option value="Klapper Hall">Klapper Hall</option>
            <option value="Music Building (LeFrak Concert Hall)">Music Building (LeFrak Concert Hall)</option>
            <option value="Powdermaker Hall">Powdermaker Hall</option>
            <option value="Queens Hall">Queens Hall</option>
            <option value="Rathaus Hall">Rathaus Hall</option>
            <option value="Razran Hall">Razran Hall</option>
            <option value="Remsen Hall">Remsen Hall</option>
            <option value="Rosenthal Library">Rosenthal Library</option>
            <option value="Science Building">Science Building</option>
            <option value="Student Union">Student Union</option>
            <option value="The Summit">The Summit</option>
            <option value="Other">Other</option>
        </select>

        <label>When Did You Lose It?</label>
        <input type="date" name="lostDate" id="lostDate" required>

        <label>Upload Photo / Supporting File</label>
        <input type="file" name="proofFile" accept=".jpg,.jpeg,.png,.pdf,.txt">

        <input type="submit" value="Submit Ticket">

    </form>

    <br>

    <a class="back-link" href="index.html">Back to Home</a>

</div>

<script>
    document.getElementById("studentId").addEventListener("input", function () {
        this.value = this.value.replace(/[^0-9]/g, "");
    });

    document.getElementById("phone").addEventListener("input", function () {
        this.value = this.value.replace(/[^0-9]/g, "");
    });

    const today = new Date().toISOString().split("T")[0];
    const minDate = "2023-01-01";

    const lostDateInput = document.getElementById("lostDate");
    lostDateInput.setAttribute("min", minDate);
    lostDateInput.setAttribute("max", today);
</script>

</body>
</html>
